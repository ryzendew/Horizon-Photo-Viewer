<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#87ceeb"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
    <clipPath id="mat">
      <rect x="16" y="16" width="96" height="96" rx="4"/>
    </clipPath>
  </defs>

  <!-- Frame outer shadow -->
  <rect x="4" y="4" width="120" height="120" rx="8" fill="rgba(0,0,0,0.2)"/>

  <!-- Frame -->
  <rect x="4" y="4" width="120" height="120" rx="8" fill="url(#frame)"/>

  <!-- Frame inner highlight -->
  <rect x="5" y="5" width="118" height="118" rx="7" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Mat (inner canvas) -->
  <rect x="16" y="16" width="96" height="96" rx="4" fill="#f5f0e8"/>

  <!-- Content clipped to mat -->
  <g clip-path="url(#mat)">
    <!-- Sky -->
    <rect x="16" y="16" width="96" height="96" fill="url(#sky)"/>

    <!-- Sun -->
    <circle cx="84" cy="38" r="12" fill="#f7d84a" opacity="0.9"/>
    <circle cx="84" cy="38" r="14" fill="#f7d84a" opacity="0.2"/>

    <!-- Far mountain -->
    <polygon points="16,80 40,42 52,56 64,38 80,56 96,44 112,72 112,96 16,96" fill="#7aa3b8"/>

    <!-- Near mountain -->
    <polygon points="16,88 36,60 52,74 68,54 88,70 112,52 112,96 16,96" fill="#5c8a6e"/>

    <!-- Ground -->
    <rect x="16" y="88" width="96" height="24" fill="#4a7a5c"/>

    <!-- Ground highlight -->
    <ellipse cx="64" cy="98" rx="36" ry="4" fill="#5c9a6e" opacity="0.5"/>
  </g>

  <!-- Mat inner shadow -->
  <rect x="16" y="16" width="96" height="96" rx="4" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>

  <!-- Glass reflection -->
  <path d="M18,18 L52,18 L18,52 Z" fill="rgba(255,255,255,0.06)"/>
</svg>
